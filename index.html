<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nova Dental Hospital - Your Family Dental Clinic">
    <title>Nova Dental Hospital</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Nova Dental Hospital</h1>
        <h2>Providing Quality Family Dental Care</h2>
        <button onclick="window.location.href='tel:+910000000000'">Call Us</button>
        <button onclick="window.open('https://wa.me/10000000000', '_blank')">WhatsApp Us</button>
    </header>

    <section id="services">
        <h2>Our Services</h2>
        <ul>
            <li>General Dentistry</li>
            <li>Cosmetic Dentistry</li>
            <li>Pediatric Dentistry</li>
            <li>Orthodontics</li>
        </ul>
    </section>

    <section id="gallery">
        <h2>Image Gallery</h2>
        <div class="gallery">
            <img src="image1.jpg" alt="Dental Clinic Image 1">
            <img src="image2.jpg" alt="Dental Clinic Image 2">
            <img src="image3.jpg" alt="Dental Clinic Image 3">
        </div>
    </section>

    <section id="hours">
        <h2>Clinic Hours</h2>
        <p>Monday to Friday: 9am - 5pm</p>
    </section>

    <footer>
        <p>Visitor Count: <span id="visitor-counter">0</span></p>
    </footer>

    <script>
        // Visitor counter script
        let count = localStorage.getItem('visitorCount') || 0;
        count++;
        localStorage.setItem('visitorCount', count);
        document.getElementById('visitor-counter').innerText = count;
    </script>
</body>
</html>
